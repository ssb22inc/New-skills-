<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PulseRN · Clinical Review Console</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root { --ink:#12211e; --teal:#0e6e5c; --bg:#f4f7f6; --card:#fff; --line:#dde5e2;
          --ok:#0e6e5c; --no:#b3432e; --warn:#9a6a12; --muted:#5a6a65; }
  * { box-sizing:border-box; margin:0; }
  body { font:16px/1.55 system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--ink); padding:16px; max-width:820px; margin:0 auto; }
  h1 { font-size:20px; margin-bottom:2px; } h1 b { color:var(--teal); }
  .sub { color:var(--muted); font-size:13px; margin-bottom:14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:12px; }
  .meta { display:flex; gap:8px; flex-wrap:wrap; font:600 11px/1 ui-monospace,monospace; color:var(--muted); margin-bottom:10px; text-transform:uppercase; }
  .meta span { background:var(--bg); padding:4px 8px; border-radius:6px; }
  .stem { font-weight:600; margin-bottom:10px; white-space:pre-wrap; }
  .opt { padding:8px 10px; border:1px solid var(--line); border-radius:8px; margin-bottom:6px; font-size:15px; }
  .opt.key { border-color:var(--ok); background:#e8f3ef; font-weight:600; }
  .rationale { background:var(--bg); border-left:3px solid var(--teal); padding:10px 12px; border-radius:0 8px 8px 0; font-size:14px; margin:10px 0; }
  .ainotes { background:#fcf3e2; border-left:3px solid var(--warn); padding:10px 12px; border-radius:0 8px 8px 0; font-size:13px; color:#5c4410; margin:10px 0; }
  .row { display:flex; gap:8px; margin-top:12px; }
  button { flex:1; padding:12px; border:0; border-radius:10px; font:700 15px system-ui; cursor:pointer; }
  .approve { background:var(--ok); color:#fff; } .reject { background:var(--no); color:#fff; }
  .skip { background:var(--bg); color:var(--ink); border:1px solid var(--line) !important; }
  textarea, input { width:100%; padding:10px; border:1px solid var(--line); border-radius:8px; font:15px system-ui; margin-top:8px; }
  .count { font:700 13px ui-monospace,monospace; color:var(--teal); }
  .empty { text-align:center; padding:40px 16px; color:var(--muted); }
  .grid { font-size:14px; } .grid table { border-collapse:collapse; width:100%; margin:8px 0; }
  .grid td, .grid th { border:1px solid var(--line); padding:6px 8px; text-align:left; }
  .grid td.key { background:#e8f3ef; font-weight:700; }
  #auth.card input { margin-top:8px; }
  .checklist { font-size:13px; color:var(--muted); margin:10px 0; }
  .checklist li { margin-bottom:3px; }
</style>
</head>
<body>
<h1>PULSE<b>RN</b> · Clinical Review Console</h1>
<p class="sub">Nothing goes live to students until you approve it here. You are the safety gate.</p>

<div id="auth" class="card">
  <p><b>Reviewer sign-in</b> (licensed RN account)</p>
  <input id="email" type="email" placeholder="email" autocomplete="username">
  <div style="position:relative">
    <input id="pw" type="password" placeholder="password" autocomplete="current-password" style="padding-right:70px">
    <button type="button" id="pwToggle" style="position:absolute;right:4px;top:12px;flex:none;width:auto;padding:6px 10px;background:none;border:none;color:var(--muted);font:600 13px system-ui;cursor:pointer"
      onclick="const p=document.getElementById('pw');const show=p.type==='password';p.type=show?'text':'password';this.textContent=show?'Hide':'Show'">Show</button>
  </div>
  <div class="row"><button class="approve" onclick="signIn()">Sign in</button></div>
  <p class="sub" id="autherr" style="color:var(--no)"></p>
</div>

<div id="app" style="display:none">
  <div class="row" style="margin-bottom:12px">
    <button class="skip" id="tabQueue" onclick="showTab('queue')" style="font-weight:700">Review queue</button>
    <button class="skip" id="tabHealth" onclick="showTab('health')">Item health</button>
    <button class="skip" id="tabReports" onclick="showTab('reports')">Reports</button>
  </div>
  <div id="queueView">
    <p class="count" id="queueCount"></p>
    <div id="item"></div>
  </div>
  <div id="healthView" style="display:none"></div>
  <div id="reportsView" style="display:none"></div>
</div>

<script>
/* CONFIG — public values only. The anon key is safe here; RLS decides
   what a signed-in reviewer can see and change (SQL in the build doc). */
const SUPABASE_URL = 'https://xlfdywudgamrnzjwtrtd.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_wH9FG2HgmC9hrvqNO4hZiQ_eJi86SUd';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let queue = [], idx = 0, user = null;

async function signIn() {
  const { data, error } = await sb.auth.signInWithPassword({
    email: document.getElementById('email').value,
    password: document.getElementById('pw').value,
  });
  if (error) { document.getElementById('autherr').textContent = error.message; return; }
  user = data.user;
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await loadQueue();
}

async function loadQueue() {
  const { data, error } = await sb.from('questions')
    .select('*').eq('approved', false).is('rejected_at', null)
    .order('created_at', { ascending: true }).limit(200);
  if (error) { alert('Load failed: ' + error.message + '\nCheck the reviewer RLS policies (build doc §Gate 4).'); return; }
  queue = data || []; idx = 0; render();
}

const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function answerView(q) {
  const ex = q.extra || {};
  const exhibit = Array.isArray(ex.exhibit) && ex.exhibit.length
    ? `<div class="grid">${ex.exhibit.map((e)=>`<p><b>📋 ${esc(e.label)}</b></p><p class="sub" style="white-space:pre-wrap">${esc(e.content)}</p>`).join('')}</div>`
    : '';
  const body = answerBody(q, ex);
  return exhibit + body;
}

function answerBody(q, ex) {
  if (q.type === 'mc')
    return q.options.map((o,i)=>`<div class="opt${i===q.answer?' key':''}">${i===q.answer?'✓ ':''}${esc(o)}</div>`).join('');
  if (q.type === 'sata')
    return q.options.map((o,i)=>`<div class="opt${q.answer.includes(i)?' key':''}">${q.answer.includes(i)?'☑ ':'☐ '}${esc(o)}</div>`).join('');
  if (q.type === 'order')
    return q.answer.map((oi,pos)=>`<div class="opt key">${pos+1}. ${esc(q.options[oi])}</div>`).join('');
  if (q.type === 'matrix') {
    const rows = ex.rows.map((r,ri)=>`<tr><td>${esc(r)}</td>${ex.columns.map((c,ci)=>`<td class="${q.answer[ri]===ci?'key':''}">${q.answer[ri]===ci?'✓':''}</td>`).join('')}</tr>`).join('');
    return `<div class="grid"><table><tr><th></th>${ex.columns.map(c=>`<th>${esc(c)}</th>`).join('')}</tr>${rows}</table></div>`;
  }
  if (q.type === 'bowtie') {
    const a = q.answer;
    return `<div class="grid">
      <p><b>Actions to take:</b> ${a.actions.map(i=>esc(ex.actions[i])).join(' · ')}</p>
      <p><b>Condition:</b> ${esc(ex.conditions[a.condition])}</p>
      <p><b>Parameters to monitor:</b> ${a.parameters.map(i=>esc(ex.parameters[i])).join(' · ')}</p>
      <p class="sub">Candidate pools — actions: ${ex.actions.map(esc).join(', ')} | conditions: ${ex.conditions.map(esc).join(', ')} | parameters: ${ex.parameters.map(esc).join(', ')}</p></div>`;
  }
  if (q.type === 'cloze') {
    let stem = esc(q.stem);
    ex.dropdowns.forEach((d,i)=>{ stem = stem.replace(`{${i}}`, `<b style="color:var(--teal)">[${esc(d[q.answer[i]])}]</b> <span class="sub">(of: ${d.map(esc).join(' / ')})</span>`); });
    return `<div class="grid">${stem}</div>`;
  }
  if (q.type === 'calc')
    return `<div class="opt key">✓ ${esc(String(q.answer))} ${esc(ex.unit ?? '')}${ex.tolerance ? ` <span class="sub">(± ${esc(String(ex.tolerance))})</span>` : ''}</div>`;
  if (q.type === 'highlight')
    return ex.tokens.map((t,i)=>`<div class="opt${q.answer.includes(i)?' key':''}">${q.answer.includes(i)?'🖍 ':''}${esc(t)}</div>`).join('');
  return '<p>Unknown type</p>';
}

function render() {
  document.getElementById('queueCount').textContent =
    queue.length ? `${queue.length - idx} of ${queue.length} awaiting review` : '';
  const el = document.getElementById('item');
  if (idx >= queue.length) {
    el.innerHTML = `<div class="card empty"><p style="font-size:32px">🎉</p><p><b>Queue clear.</b></p><p class="sub">Every pending item has been reviewed. Run the content factory to refill.</p></div>`;
    return;
  }
  const q = queue[idx];
  el.innerHTML = `
  <div class="card">
    <div class="meta">
      <span>${esc(q.cat)}</span><span>${esc(q.type)}</span><span>diff ${q.diff}</span>
      ${q.ai ? `<span>✨ AI · ${esc(q.gen_model||'?')}</span>` : '<span>human-written</span>'}
    </div>
    <p class="stem">${esc(q.stem)}</p>
    ${answerView(q)}
    <div class="rationale"><b>Rationale.</b> ${esc(q.rationale)}</div>
    ${q.reviewer_notes ? `<div class="ainotes"><b>AI adversarial reviewer said:</b> ${esc(q.reviewer_notes)}</div>` : ''}
    <ul class="checklist">
      <li>☐ Key is truly and solely correct against a current source</li>
      <li>☐ Every distractor is defensibly wrong — no second right answer</li>
      <li>☐ Current practice — no outdated values, drugs, protocols</li>
      <li>☐ Correct category and fair difficulty tag</li>
      <li>☐ Nothing readable as real-world treatment advice</li>
    </ul>
    <textarea id="note" placeholder="Reviewer note (required to reject — say exactly what's wrong)"></textarea>
    <div class="row">
      <button class="approve" onclick="decide(true)">✓ Approve — goes live</button>
      <button class="reject" onclick="decide(false)">✗ Reject</button>
      <button class="skip" onclick="idx++;render()">Skip →</button>
    </div>
  </div>`;
}

async function decide(approve) {
  const q = queue[idx];
  const note = document.getElementById('note').value.trim();
  if (!approve && !note) { alert('A rejection needs a note — it trains the factory prompts.'); return; }
  const patch = approve
    ? { approved: true, last_reviewed_at: new Date().toISOString(), reviewed_by: user.id, human_review_note: note || null }
    : { rejected_at: new Date().toISOString(), reviewed_by: user.id, human_review_note: note };
  const { error } = await sb.from('questions').update(patch).eq('id', q.id);
  if (error) { alert('Save failed: ' + error.message); return; }
  idx++; render();
}

/* ---- Health tab: approved items whose aggregate stats look broken ----
   itemHealth copied verbatim from src/ability-engine.js (no bundler here). */
function itemHealth({ timesAnswered, timesCorrect, rating }) {
  if (timesAnswered < 20) return { status: "collecting", flag: false };
  const p = timesCorrect / timesAnswered;
  if (p > 0.95) return { status: "too easy — no signal", flag: true };
  if (p < 0.15) return { status: "too hard or miskeyed — audit the key", flag: true };
  if (rating < 900 || rating > 1750) return { status: "rating drifted — re-review", flag: true };
  return { status: "healthy", flag: false };
}

function showTab(t) {
  document.getElementById('queueView').style.display = t === 'queue' ? 'block' : 'none';
  document.getElementById('healthView').style.display = t === 'health' ? 'block' : 'none';
  document.getElementById('reportsView').style.display = t === 'reports' ? 'block' : 'none';
  document.getElementById('tabQueue').style.fontWeight = t === 'queue' ? '700' : '400';
  document.getElementById('tabHealth').style.fontWeight = t === 'health' ? '700' : '400';
  document.getElementById('tabReports').style.fontWeight = t === 'reports' ? '700' : '400';
  if (t === 'health') loadHealth();
  if (t === 'reports') loadReports();
}

/* ---- Reports tab: student-filed problems with live questions ---- */
async function loadReports() {
  const el = document.getElementById('reportsView');
  el.innerHTML = '<div class="card empty"><p class="sub">Loading reports…</p></div>';
  const { data, error } = await sb.from('question_reports')
    .select('id, item_id, message, created_at, questions(stem, cat, type)')
    .is('resolved_at', null).order('created_at', { ascending: true }).limit(100);
  if (error) { el.innerHTML = `<div class="card empty"><p class="sub">Load failed: ${esc(error.message)}</p></div>`; return; }
  if (!data?.length) {
    el.innerHTML = '<div class="card empty"><p style="font-size:32px">📭</p><p><b>No open reports.</b></p><p class="sub">When a student flags a problem with a question, it lands here.</p></div>';
    return;
  }
  el.innerHTML = data.map((r) => `
    <div class="card">
      <div class="meta"><span>report #${r.id}</span><span>item #${r.item_id ?? '?'}</span>
        ${r.questions ? `<span>${esc(r.questions.cat)}</span><span>${esc(r.questions.type)}</span>` : ''}
        <span>${esc((r.created_at || '').slice(0, 10))}</span></div>
      ${r.questions ? `<p class="stem">${esc(r.questions.stem.slice(0, 160))}${r.questions.stem.length > 160 ? '…' : ''}</p>` : ''}
      <div class="ainotes"><b>Student says:</b> ${esc(r.message)}</div>
      <div class="row">
        <button class="approve" onclick="resolveReport(${r.id})">✓ Mark resolved</button>
      </div>
    </div>`).join('');
}

async function resolveReport(id) {
  const { error } = await sb.from('question_reports')
    .update({ resolved_at: new Date().toISOString(), resolved_by: user.id }).eq('id', id);
  if (error) { alert('Update failed: ' + error.message); return; }
  loadReports();
}

async function loadHealth() {
  const el = document.getElementById('healthView');
  el.innerHTML = '<div class="card empty"><p class="sub">Checking approved items…</p></div>';
  const { data, error } = await sb.from('questions')
    .select('id, cat, type, diff, stem, times_answered, times_correct, elo_rating')
    .eq('approved', true).is('rejected_at', null);
  if (error) { el.innerHTML = `<div class="card empty"><p class="sub">Load failed: ${esc(error.message)}</p></div>`; return; }
  const flagged = (data || []).map((q) => ({
    q, h: itemHealth({ timesAnswered: q.times_answered, timesCorrect: q.times_correct, rating: q.elo_rating ?? 1300 }),
  })).filter((x) => x.h.flag);
  if (!flagged.length) {
    el.innerHTML = `<div class="card empty"><p style="font-size:32px">✅</p><p><b>No flagged items.</b></p><p class="sub">Every approved item with enough data looks statistically healthy (${(data || []).length} approved items checked).</p></div>`;
    return;
  }
  el.innerHTML = flagged.map(({ q, h }) => `
    <div class="card">
      <div class="meta"><span>#${q.id}</span><span>${esc(q.cat)}</span><span>${esc(q.type)}</span><span>diff ${q.diff}</span></div>
      <p class="stem">${esc(q.stem.slice(0, 140))}${q.stem.length > 140 ? '…' : ''}</p>
      <div class="ainotes"><b>⚠ ${esc(h.status)}</b> · answered ${q.times_answered}× · ${q.times_answered ? Math.round((q.times_correct / q.times_answered) * 100) : 0}% correct · rating ${q.elo_rating == null ? 'unseeded' : Math.round(q.elo_rating)}</div>
    </div>`).join('');
}
</script>
</body>
</html>
