market_id: do
name: República Dominicana

language:
  primary: es-DO
  dialect: dominicano
  copy_directives:
    - Greet warmly. Short sentences. No jargon, ever.
    - Local phrasing where it lands naturally; never forced.
    - Money is always plain numbers — "you spent X, it brought in Y."

currency:
  code: DOP
  symbol: RD$
  exponent: 2

timezone: America/Santo_Domingo

calendar:
  holidays:
    - name: New Year's Day
      date: 01-01
    - name: Good Friday
      rule: easter-2
    - name: Easter Monday
      rule: easter+1
    - name: Día de la Independencia
      date: 02-27
    - name: Christmas Day
      date: 12-25
    - name: Boxing Day
      date: 12-26

channels:
  primary: whatsapp
  fallbacks:
    - sms

payments:
  providers:
    - id: pending-local-psp
      kind: placeholder

compliance:
  data_protection:
    law: Ley No. 172-13 de Protección de Datos (República Dominicana)
    dpa_signature_required: true
  # ALL fields below require local counsel verification before this market
  # can flip live. Values here are drafting placeholders, not advice.
  marketplace_facilitator_collection: false
  verified_by_counsel: false

tax:
  gct_registration_threshold:
    # Local sales-tax (VAT/GST/ABST) registration threshold, minor units.
    # Placeholder pending counsel — flip is blocked regardless while
    # verified_by_counsel is false.
    amount_minor: 4000000000
    currency: DOP
