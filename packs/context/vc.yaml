market_id: vc
name: Saint Vincent & the Grenadines

language:
  primary: en-VC
  dialect: vincentian
  copy_directives:
    - Greet warmly. Short sentences. No jargon, ever.
    - Local phrasing where it lands naturally; never forced.
    - Money is always plain numbers — "you spent X, it brought in Y."

currency:
  code: XCD
  symbol: EC$
  exponent: 2

timezone: America/St_Vincent

calendar:
  holidays:
    - name: New Year's Day
      date: 01-01
    - name: Good Friday
      rule: easter-2
    - name: Easter Monday
      rule: easter+1
    - name: Independence Day
      date: 10-27
    - name: Christmas Day
      date: 12-25
    - name: Boxing Day
      date: 12-26

channels:
  primary: whatsapp
  fallbacks:
    - sms

payments:
  providers:
    - id: pending-local-psp
      kind: placeholder

compliance:
