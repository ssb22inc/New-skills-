booking:
  # Tours hold real capacity for hours — 20.00% deposit by default.
  deposit_default_bps: 2000
  completion_proof:
    - qr_scan
    - geo_checkin

mentor:
  review_heuristics:
    - signal: timeliness
      keywords:
        - late
        - on time
        - delayed
    - signal: guide_quality
      keywords:
        - knowledgeable
        - friendly
        - rude
    - signal: safety
      keywords:
        - unsafe
        - life jacket
        - reckless
