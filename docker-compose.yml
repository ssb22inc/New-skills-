services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sycamore
      POSTGRES_PASSWORD: sycamore
      POSTGRES_DB: sycamore
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sycamore -d sycamore']
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
