{{- if .Values.backup.enabled }}
---
# Kubernetes CronJob — Haven Database Backup
# Runs on the schedule defined in .Values.backup.schedule (default: every 6 hours).
# Requires a pre-existing secret named {{ .Values.backup.secretName }} with keys:
#   database-url, aws-access-key-id, aws-secret-access-key, aws-region,
#   s3-bucket, encryption-key, slack-webhook (optional)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "haven.fullname" . }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "haven.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "haven.fullname" . }}-backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "haven.serviceAccountName" . }}
          initContainers:
            - name: pg-dump
              image: postgres:15-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  FILENAME="haven_{{ .Release.Namespace }}_${TIMESTAMP}.sql.gz"
                  echo "$FILENAME" > /backup/filename.txt
                  echo "[$(date -u +%FT%TZ)] Dumping database..."
                  pg_dump "$DATABASE_URL" \
                    --format=plain \
                    --no-owner \
                    --no-acl \
                    --clean \
                    --if-exists \
                    | gzip -9 > "/backup/${FILENAME}"
                  du -sh "/backup/${FILENAME}" | cut -f1 > /backup/dump_size.txt
                  echo "[$(date -u +%FT%TZ)] Dump complete: ${FILENAME}"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.secretName }}
                      key: database-url
              volumeMounts:
                - name: backup-staging
                  mountPath: /backup
          containers:
            - name: encrypt-upload
              image: alpine:3.19
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  apk add --no-cache aws-cli gpg gpg-agent curl 2>/dev/null
                  FILENAME=$(cat /backup/filename.txt)
                  DUMP_SIZE=$(cat /backup/dump_size.txt)
                  gpg --batch --yes \
                    --passphrase "$BACKUP_ENCRYPTION_KEY" \
                    --symmetric \
                    --cipher-algo AES256 \
                    --output "/backup/${FILENAME}.gpg" \
                    "/backup/${FILENAME}"
                  rm -f "/backup/${FILENAME}"
                  S3_PATH="s3://${AWS_S3_BACKUP_BUCKET}/backups/{{ .Release.Namespace }}/${FILENAME}.gpg"
                  aws s3 cp "/backup/${FILENAME}.gpg" "$S3_PATH" \
                    --storage-class STANDARD_IA \
                    --metadata "environment={{ .Release.Namespace }}"
                  aws s3 ls "$S3_PATH" || { echo "ERROR: Upload verification failed!"; exit 1; }
                  echo "[$(date -u +%FT%TZ)] Backup complete: ${S3_PATH} (${DUMP_SIZE})"
                  if [ -n "${SLACK_BACKUP_WEBHOOK:-}" ]; then
                    curl -s -X POST "$SLACK_BACKUP_WEBHOOK" \
                      -H 'Content-Type: application/json' \
                      -d "{\"text\": \"Haven backup complete: \`${FILENAME}.gpg\` (${DUMP_SIZE})\"}" \
                      || true
                  fi
              env:
                - name: BACKUP_ENCRYPTION_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.secretName }}
                      key: encryption-key
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.secretName }}
                      key: aws-access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.secretName }}
                      key: aws-secret-access-key
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.secretName }}
                      key: aws-region
                - name: AWS_S3_BACKUP_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.secretName }}
                      key: s3-bucket
                - name: SLACK_BACKUP_WEBHOOK
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.secretName }}
                      key: slack-webhook
                      optional: true
              volumeMounts:
                - name: backup-staging
                  mountPath: /backup
          volumes:
            - name: backup-staging
              emptyDir: {}
{{- end }}
