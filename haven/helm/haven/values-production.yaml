# Production environment overrides for Haven
# Extends helm/haven/values.yaml

replicaCount: 3

image:
  repository: haven/app
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Robots-Tag: index, follow";
  hosts:
    - host: haven.app
      paths:
        - path: /
          pathType: Prefix
    - host: www.haven.app
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: haven-tls
      hosts:
        - haven.app
        - www.haven.app

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Production Redis — HA sentinel replication with persistence
redis:
  enabled: true
  architecture: replication
  auth:
    enabled: true
    existingSecret: haven-redis-secret
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      size: 10Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  replica:
    replicaCount: 2
    persistence:
      size: 10Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  sentinel:
    enabled: true

# Production-specific env
env:
  NODE_ENV: production
  LOG_LEVEL: info
  NEXT_PUBLIC_APP_URL: https://haven.app

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  environment: production

# Database backup — enabled in production, every 6 hours
backup:
  enabled: true
  schedule: "0 */6 * * *"
  secretName: haven-backup-secrets

# PodDisruptionBudget — ensure at least 2 pods always available
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Topology spread for HA across AZs
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: haven
        topologyKey: topology.kubernetes.io/zone
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: haven
          topologyKey: kubernetes.io/hostname
