apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: haven-app-network-policy
  namespace: haven
spec:
  podSelector:
    matchLabels:
      app: haven
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

    # Allow traffic from same namespace (for pod-to-pod communication)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3000

  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

    # Allow Redis connection
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

    # Allow HTTPS to external services (Supabase, Stripe, OpenAI)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

    # Allow HTTP to external services
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: haven
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Only allow connections from Haven app pods
    - from:
        - podSelector:
            matchLabels:
              app: haven
      ports:
        - protocol: TCP
          port: 6379

    # Allow Prometheus scraping (if monitoring is enabled)
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 6379

  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53

---
# Default deny all ingress for namespace (opt-in security)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: haven
spec:
  podSelector: {}
  policyTypes:
    - Ingress
