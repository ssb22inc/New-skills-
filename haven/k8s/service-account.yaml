apiVersion: v1
kind: ServiceAccount
metadata:
  name: haven-app
  namespace: haven
  labels:
    app: haven
automountServiceAccountToken: false

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: haven-app-role
  namespace: haven
rules:
  # Allow reading ConfigMaps for configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  # Allow reading Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

  # Allow reading own pod info for health checks
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
    resourceNames: ["haven-app"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: haven-app-rolebinding
  namespace: haven
subjects:
  - kind: ServiceAccount
    name: haven-app
    namespace: haven
roleRef:
  kind: Role
  name: haven-app-role
  apiGroup: rbac.authorization.k8s.io

---
# Service account for Redis
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis
  namespace: haven
  labels:
    app: redis
automountServiceAccountToken: false
